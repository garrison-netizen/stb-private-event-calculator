<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Private Event Calculator</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2">
  <link rel="icon" type="image/png" href="/favicon.png?v=2">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      color: #1f2733; background: #eef0f3; -webkit-font-smoothing: antialiased;
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .signin-card {
      background: #16243f; border-radius: 12px; padding: 40px 44px; text-align: center;
      width: 392px; max-width: 92vw; box-shadow: 0 16px 44px #0000004d;
    }
    .signin-logo { height: 50px; width: auto; margin-bottom: 16px; }
    .signin-card h1 { font-size: 17px; font-weight: 600; color: #fff; margin-bottom: 14px; }
    .signin-msg { font-size: 13px; color: #9fb0cc; line-height: 1.5; margin-bottom: 22px; }
    .signin-deny { font-size: 13px; color: #ff9b9b; line-height: 1.5; margin-bottom: 22px; }
    .signin-deny strong { color: #ffc9c9; }
    .signin-btn { display: flex; justify-content: center; min-height: 44px; }
  </style>
</head>
<body>
  <div class="signin-card">
    <img src="/logo-mark.png" alt="Spindletap Beverages" class="signin-logo">
    <h1>Private Event Calculator</h1>
    <p class="signin-msg" id="msg-default">Sign in with your Spindletap Google account to open the calculator.</p>
    <p class="signin-deny" id="msg-deny" style="display:none"></p>
    <div class="signin-btn" id="btn"></div>
  </div>

  <script>
    function handleCredential(response) {
      document.cookie = "gauth=" + response.credential +
        "; path=/; max-age=3600; secure; samesite=strict";
      window.location = "/app";
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, function (c) {
        return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
      });
    }

    function showMessage() {
      var params = new URLSearchParams(window.location.search);
      var deny = document.getElementById("msg-deny");
      var def = document.getElementById("msg-default");
      if (params.has("denied")) {
        var who = params.get("as");
        deny.innerHTML =
          (who
            ? "You're signed in as <strong>" + escapeHtml(who) + "</strong>, which isn't on the access list. "
            : "That account isn't on the access list. ") +
          "Sign in with the Google account Garrison authorized — tap the button and choose " +
          "<strong>“Use another account”</strong> if you need to switch — or contact <strong>Garrison</strong> to be added.";
        deny.style.display = "block"; def.style.display = "none";
      } else if (params.has("expired")) {
        deny.textContent = "Your session expired. Please sign in again.";
        deny.style.display = "block"; def.style.display = "none";
      }
    }

    window.addEventListener("load", function () {
      showMessage();
      fetch("/api/config")
        .then(function (r) { return r.json(); })
        .then(function (cfg) {
          if (!cfg.clientId) {
            var deny = document.getElementById("msg-deny");
            deny.textContent = "Sign-in is not configured yet. Contact Garrison.";
            deny.style.display = "block";
            return;
          }
          google.accounts.id.initialize({
            client_id: cfg.clientId,
            callback: handleCredential,
            // Never silently reuse the browser's default Google account — that
            // signed people in as the wrong account (e.g. a personal Gmail not
            // on the list) with no way to choose. Make them pick deliberately.
            auto_select: false
          });
          google.accounts.id.renderButton(
            document.getElementById("btn"),
            { theme: "filled_blue", size: "large", text: "signin_with", shape: "pill" }
          );
          // Show One Tap only on a clean first visit. After a denial/expiry we
          // want the account chooser (the button), not a silent re-prompt.
          var p = new URLSearchParams(window.location.search);
          if (!p.has("denied") && !p.has("expired")) {
            google.accounts.id.prompt();
          }
        });
    });
  </script>
</body>
</html>
